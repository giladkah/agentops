<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ensemble — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0c0c0e;color:rgba(236,236,241,0.92);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.login-card{text-align:center;max-width:380px;padding:48px 40px}
.logo{width:48px;height:48px;border-radius:12px;background:#818cf8;display:inline-flex;align-items:center;justify-content:center;margin-bottom:24px}
.logo span{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:#fff}
h1{font-size:24px;font-weight:700;letter-spacing:-0.03em;margin-bottom:8px}
.tagline{font-size:14px;color:rgba(161,161,170,0.85);line-height:1.5;margin-bottom:40px}
.btn-github{display:inline-flex;align-items:center;gap:10px;padding:12px 28px;border-radius:8px;background:#fff;color:#0c0c0e;font-size:14px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:background 150ms}
.btn-github:hover{background:#e4e4e7}
.btn-github svg{width:20px;height:20px}
.footer{margin-top:48px;font-size:12px;color:rgba(113,113,122,0.7)}
.footer a{color:rgba(161,161,170,0.85);text-decoration:none}
.footer a:hover{color:rgba(236,236,241,0.92)}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo"><span>E</span></div>

</html>
